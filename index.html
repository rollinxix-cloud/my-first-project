<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jon Bonz | Digital Hub</title>
    <style>
        /* General Setup */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* The Card Container */
        .card { 
            background: #1e293b; 
            padding: 2.5rem; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #334155; 
            max-width: 350px; 
            width: 90%;
        }

        /* Profile Image Style (Looks for profile.jpg in your folder) */
        .profile-img { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 3px solid #38bdf8; 
            margin-bottom: 1rem; 
            object-fit: cover; 
            background-color: #334155;
        }

        h1 { 
            color: #38bdf8; 
            margin-bottom: 0.5rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p { 
            color: #94a3b8; 
            line-height: 1.4; 
            margin-bottom: 2rem;
        }

        /* THE FIX: Button Styles with Visible Text */
        .btn { 
            display: block; 
            background: #38bdf8; 
            color: #0f172a !important; /* Force text to be Dark Navy for visibility */
            padding: 12px; 
            margin: 12px 0; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.3s ease;
            text-align: center;
            border: none;
        }

        .btn:hover { 
            background: #7dd3fc; 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="profile.jpg" alt="Jon Bonz" class="profile-img">
        
        <h1>JON BONZ</h1>
        <p>eSports Organizer | Digital Agent | Content Creator</p>
        
        <div class="links">
            <a href="tournaments.html" class="btn">View My Tournaments</a>
            
            <a href="#" class="btn">Contact for Deposits</a>
            <a href="#" class="btn">YouTube Channel</a>
        </div>
    </div>

</body>
</html>
